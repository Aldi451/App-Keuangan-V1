<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Keuangan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="card mb-4">
            <div class="card-body text-center py-4">
                <h1 class="fw-bold text-black mb-2">
                    <i class="bi bi-wallet2"></i> Dashboard Keuangan
                </h1>
                <p class="text-black-50 mb-0">Kelola keuangan Anda dengan lebih baik</p>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-3 col-sm-6">
                <div class="balance-card h-100">
                    <small><i class="bi bi-wallet"></i> Opening Balance</small>
                    <h3 id="openingBalance">Rp 0</h3>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="balance-card h-100" style="background: linear-gradient(135deg, #198754 0%, #20c997 100%);">
                    <small><i class="bi bi-arrow-down-circle"></i> Pemasukan</small>
                    <h3 id="totalMasuk">Rp 0</h3>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="balance-card h-100" style="background: linear-gradient(135deg, #dc3545 0%, #ff6b6b 100%);">
                    <small><i class="bi bi-arrow-up-circle"></i> Pengeluaran</small>
                    <h3 id="totalKeluar">Rp 0</h3>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="balance-card h-100" style="background: linear-gradient(135deg, #0dcaf0 0%, #0d9488 100%);">
                    <small><i class="bi bi-piggy-bank"></i> Ending Balance</small>
                    <h3 id="endingBalance">Rp 0</h3>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <div class="d-flex gap-2 flex-wrap mb-3">
                    <button class="btn btn-primary btn-action" onclick="toggleSection('sectionGrafik', this)">
                        <i class="bi bi-graph-up"></i> Grafik
                    </button>
                    <button class="btn btn-info btn-action" onclick="toggleSection('sectionSummary', this)">
                        <i class="bi bi-pie-chart"></i> Summary
                    </button>
                    <button class="btn btn-success btn-action" onclick="toggleSection('sectionTransaksi', this)">
                        <i class="bi bi-list-ul"></i> Transaksi
                    </button>
                    <button class="btn btn-warning btn-action" onclick="toggleSection('sectionPembanding', this)">
                        <i class="bi bi-arrows-angle-expand"></i> Pembanding
                    </button>
                    <button class="btn btn-secondary btn-action" onclick="exportExcel()">
                        <i class="bi bi-file-earmark-excel"></i> Export Excel
                    </button>
                    <button class="btn btn-dark btn-action" onclick="exportDatabaseBackup()">
                        <i class="bi bi-database"></i> Backup
                    </button>
                    <button class="btn btn-outline-dark btn-action" onclick="document.getElementById('restoreInput').click()">
                        <i class="bi bi-upload"></i> Restore
                    </button>
                    <input type="file" id="restoreInput" hidden accept=".json" onchange="importDatabaseBackup(this)">
                </div>

                <div class="row g-3">
                    <div class="col-md-5">
                        <label class="form-label fw-bold">📅 Bulan:</label>
                        <select id="filterBulan" class="form-select" onchange="loadData()">
                            <option value="">Semua Bulan</option>
                            <option value="01">Januari</option>
                            <option value="02">Februari</option>
                            <option value="03">Maret</option>
                            <option value="04">April</option>
                            <option value="05">Mei</option>
                            <option value="06">Juni</option>
                            <option value="07">Juli</option>
                            <option value="08">Agustus</option>
                            <option value="09">September</option>
                            <option value="10">Oktober</option>
                            <option value="11">November</option>
                            <option value="12">Desember</option>
                        </select>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label fw-bold">📆 Tahun:</label>
                        <select id="filterTahun" class="form-select" onchange="loadData()">
                            </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-primary w-100" onclick="loadData()">
                            <i class="bi bi-search"></i> Tampilkan
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Input Transaksi</h5>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-2">
                        <label class="form-label">Tanggal</label>
                        <input type="date" id="tanggal" class="form-control">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Jenis</label>
                        <select id="jenis" class="form-select">
                            <option value="Masuk">Masuk</option>
                            <option value="Keluar">Keluar</option>
                        </select>
                    </div>
                    <div class="col-md-3 category-container">
                        <label class="form-label">Kategori</label>
                        <input type="text" id="kategori" class="form-control" list="kategoriList" placeholder="Pilih atau ketik kategori">
                        <datalist id="kategoriList"></datalist>
                        <div id="kategoriSuggestions" class="suggestions"></div>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Jumlah (Rp)</label>
                        <input type="text" id="jumlah" class="form-control" placeholder="0">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Keterangan</label>
                        <input type="text" id="keterangan" class="form-control" placeholder="Opsional">
                    </div>
                    <div class="col-12 text-end">
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">
                            <i class="bi bi-x-circle"></i> Reset
                        </button>
                        <button type="button" id="btnSimpan" class="btn btn-primary" onclick="simpan()">
                            <i class="bi bi-save"></i> Simpan
                        </button>
                    </div>
                </div>
            </div>
        </div>

        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
