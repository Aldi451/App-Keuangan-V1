<!DOCTYPE html>
<html>

<head>

<title>Dashboard Keuangan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.status-baik{background:#28a745;color:white;}
.status-normal{background:#ffc107;color:black;}
.status-boros{background:#dc3545;color:white;}
.status-kosong{background:#6c757d;color:white;}

</style>

</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="text-center mb-4">Dashboard Keuangan</h2>

<div class="row g-3">

<div class="col-md-3">
<div class="card bg-secondary text-white p-3">
<h5>Opening Balance</h5>
<h3 id="openingBalance">Rp 0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card bg-success text-white p-3">
<h5>Pemasukan</h5>
<h3 id="totalMasuk">Rp 0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card bg-danger text-white p-3">
<h5>Pengeluaran</h5>
<h3 id="totalKeluar">Rp 0</h3>
</div>
</div>

<div class="col-md-3">
<div class="card bg-primary text-white p-3">
<h5>Ending Balance</h5>
<h3 id="endingBalance">Rp 0</h3>
</div>
</div>

</div>

<br>

<div class="card p-3">

<h5>Input Transaksi</h5>

<div class="row g-2">

<div class="col-md-2">
<input type="date" id="tanggal" class="form-control">
</div>

<div class="col-md-2">
<select id="jenis" class="form-control">
<option value="Masuk">Masuk</option>
<option value="Keluar">Keluar</option>
</select>
</div>

<div class="col-md-2">
<input type="text" id="kategori" class="form-control" placeholder="Kategori">
</div>

<div class="col-md-2">
<input type="number" id="jumlah" class="form-control" placeholder="Jumlah">
</div>

<div class="col-md-2">
<input type="text" id="keterangan" class="form-control" placeholder="Keterangan">
</div>

<div class="col-md-2">
<button id="btnSimpan" class="btn btn-primary w-100" onclick="simpan()">
Simpan
</button>
</div>

</div>

</div>

<br>

<div class="card p-3">

<h5>Filter Periode</h5>

<div class="row g-2">

<div class="col-md-4">
<select id="filterBulan" class="form-control">

<option value="">Semua Bulan</option>
<option value="01">Januari</option>
<option value="02">Februari</option>
<option value="03">Maret</option>
<option value="04">April</option>
<option value="05">Mei</option>
<option value="06">Juni</option>
<option value="07">Juli</option>
<option value="08">Agustus</option>
<option value="09">September</option>
<option value="10">Oktober</option>
<option value="11">November</option>
<option value="12">Desember</option>

</select>
</div>

<div class="col-md-4">
<input type="number" id="filterTahun" class="form-control" placeholder="Tahun">
</div>

<div class="col-md-4">
<button class="btn btn-success w-100" onclick="loadData()">
Tampilkan
</button>
</div>

</div>

</div>

<br>

<div class="card p-3">

<h5>Grafik Keuangan</h5>

<canvas id="chartKeuangan"></canvas>

<div class="mt-3 text-center">
<div id="statusBox" class="p-3 rounded fw-bold">
Status Keuangan
</div>
</div>

</div>

<br>

<div class="card p-3">

<h5>Daftar Transaksi</h5>

<table class="table table-striped">

<thead>

<tr>
<th>Tanggal</th>
<th>Jenis</th>
<th>Kategori</th>
<th>Jumlah</th>
<th>Keterangan</th>
<th>Saldo</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="tabelTransaksi"></tbody>

</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="script.js"></script>

<button onclick="toggleDark()" class="btn btn-dark">
🌙 Dark Mode
</button>

<button onclick="logout()" class="btn btn-danger">
Logout
</button>
<h4 id="statusKeuangan"></h4>

</body>
</html>
