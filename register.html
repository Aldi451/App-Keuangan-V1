<!DOCTYPE html>
<html>

<head>

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-4">

<div class="card p-4">

<h4 class="text-center">Register</h4>

<button class="btn btn-outline-secondary" onclick="togglePassword('password')">
👁
</button>

</div>

<button class="btn btn-success w-100" onclick="register()">Register</button>

<div class="text-center mt-3">
<a href="index.html">Kembali Login</a>
</div>

</div>

</div>

</div>

</div>

</html>
