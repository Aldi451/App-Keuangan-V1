<!DOCTYPE html>
<html>

<head>

<title>Password Baru</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-4">

<div class="card p-4">

<h4 class="text-center">Password Baru</h4>

<div class="input-group mb-3">

<input type="password" id="newPassword" class="form-control" placeholder="Password Baru">

<button class="btn btn-outline-secondary" onclick="togglePassword('newPassword')">
👁
</button>

</div>

<button class="btn btn-success w-100" onclick="updatePassword()">
Update Password
</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="auth.js"></script>

</body>
</html>
